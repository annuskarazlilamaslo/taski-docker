server {
  listen 80;
  location /api/ {

    proxy_set_header Host $http_host;
    proxy_pass http://backend:8000;
  }
  location /admin/ {
    
    proxy_set_header Host $http_host;
    proxy_pass http://backend:8000;
  }

  location / {
      alias /backend_static/static/;
      index index.html;
      try_files $uri /index.html;
  }
}